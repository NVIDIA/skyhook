# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: config-skyhook
spec:
  timeouts:
    assert: 360s
  catch: ## if errors, print the most important info
    - get:
        apiVersion: v1
        kind: Node
        selector: skyhook.nvidia.com/test-node=skyhooke2e
        format: yaml
    - get:
        apiVersion: skyhook.nvidia.com/v1alpha1
        kind: Skyhook
        name: config-skyhook
        format: yaml
  steps:
  - name: deploy
    description: Reset state, create the skyhook, and assert initial config completes
    try:
    - script:
        content: |
          ## remove annotation/labels from last run
          ../skyhook-cli reset config-skyhook --confirm 2>/dev/null || true
    - create:
        file: skyhook.yaml
    ## sequential: node/skyhook transition through lifecycle stages
    - assert:
        ## node in_progress with all packages at apply stage
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_config-skyhook: in_progress
            annotations:
              ("skyhook.nvidia.com/nodeState_config-skyhook" && parse_json("skyhook.nvidia.com/nodeState_config-skyhook")):
                {
                  "baxter|3.2.1": {
                      "name": "baxter",
                      "version": "3.2.1",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "apply",
                      "state": "in_progress"
                  },
                  "spencer|3.2.3": {
                      "name": "spencer",
                      "version": "3.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "apply",
                      "state": "in_progress"
                  },
                  "dexter|1.2.3": {
                      "name": "dexter",
                      "version": "1.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "apply",
                      "state": "in_progress"
                  },
                }
              skyhook.nvidia.com/status_config-skyhook: in_progress
          spec:
            taints:
            - effect: NoSchedule
              key: node.kubernetes.io/unschedulable
          status:
            (conditions[?type == 'skyhook.nvidia.com/config-skyhook/NotReady']):
            - reason: "Incomplete"
              status: "True"
            (conditions[?type == 'skyhook.nvidia.com/config-skyhook/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        ## skyhook in_progress
        resource:
          apiVersion: skyhook.nvidia.com/v1alpha1
          kind: Skyhook
          metadata:
            name: config-skyhook
          status:
            status: in_progress
            nodeState:
              (values(@)):
                - baxter|3.2.1:
                    name: baxter
                    state: in_progress
                    version: '3.2.1'
                    stage: apply
                    image: ghcr.io/nvidia/skyhook/agentless
                  spencer|3.2.3:
                    name: spencer
                    state: in_progress
                    version: '3.2.3'
                    stage: apply
                    image: ghcr.io/nvidia/skyhook/agentless
                  dexter|1.2.3:
                    name: dexter
                    state: in_progress
                    version: '1.2.3'
                    stage: apply
                    image: ghcr.io/nvidia/skyhook/agentless
            nodeStatus:
              (values(@)):
                - in_progress
    ## parallel: configmaps are distinct steady-state resources
    - assert:
        file: assert-cm-deploy.yaml
  - name: update while running
    description: Apply an update while the skyhook is still running and verify it is accepted
    try:
    - apply:
        file: update-while-running.yaml
    ## sequential: node/skyhook transition through lifecycle stages
    - assert:
        ## node complete with all packages at post-interrupt
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_config-skyhook: complete
            annotations:
              ("skyhook.nvidia.com/nodeState_config-skyhook" && parse_json("skyhook.nvidia.com/nodeState_config-skyhook")):
                {
                  "baxter|3.2.1": {
                      "name": "baxter",
                      "version": "3.2.1",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "post-interrupt",
                      "state": "complete"
                  },
                  "dexter|1.2.3": {
                      "name": "dexter",
                      "version": "1.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "post-interrupt",
                      "state": "complete"
                  },
                  "spencer|3.2.3": {
                      "name": "spencer",
                      "version": "3.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "post-interrupt",
                      "state": "complete"
                  }
                }
              skyhook.nvidia.com/status_config-skyhook: complete
          status:
            (conditions[?type == 'skyhook.nvidia.com/config-skyhook/NotReady']):
            - reason: "Complete"
              status: "False"
            (conditions[?type == 'skyhook.nvidia.com/config-skyhook/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        ## skyhook complete (gen 3)
        resource:
          apiVersion: skyhook.nvidia.com/v1alpha1
          kind: Skyhook
          metadata:
            name: config-skyhook
          status:
            status: complete
            observedGeneration: 3
            nodeState:
              (values(@)):
                - dexter|1.2.3:
                    name: dexter
                    state: complete
                    version: '1.2.3'
                    stage: post-interrupt
                    image: ghcr.io/nvidia/skyhook/agentless
                  baxter|3.2.1:
                    name: baxter
                    state: complete
                    version: '3.2.1'
                    stage: post-interrupt
                    image: ghcr.io/nvidia/skyhook/agentless
                  spencer|3.2.3:
                    name: spencer
                    state: complete
                    version: '3.2.3'
                    stage: post-interrupt
                    image: ghcr.io/nvidia/skyhook/agentless
            nodeStatus:
              (values(@)):
                - complete
    ## parallel: configmaps are distinct steady-state resources
    - assert:
        file: assert-cm-update-while-running.yaml
  - name: update
    description: Apply a standard config update and assert it completes
    try:
    - apply:
        file: update.yaml
    ## sequential: node/skyhook transition through lifecycle stages
    - assert:
        ## node complete with all packages at post-interrupt
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_config-skyhook: complete
            annotations:
              ("skyhook.nvidia.com/nodeState_config-skyhook" && parse_json("skyhook.nvidia.com/nodeState_config-skyhook")):
                {
                  "baxter|3.2.1": {
                      "name": "baxter",
                      "version": "3.2.1",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "post-interrupt",
                      "state": "complete"
                  },
                  "dexter|1.2.3": {
                      "name": "dexter",
                      "version": "1.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "post-interrupt",
                      "state": "complete"
                  },
                  "spencer|3.2.3": {
                      "name": "spencer",
                      "version": "3.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "post-interrupt",
                      "state": "complete"
                  }
                }
              skyhook.nvidia.com/status_config-skyhook: complete
          status:
            (conditions[?type == 'skyhook.nvidia.com/config-skyhook/NotReady']):
            - reason: "Complete"
              status: "False"
            (conditions[?type == 'skyhook.nvidia.com/config-skyhook/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        ## skyhook complete (gen 4)
        resource:
          apiVersion: skyhook.nvidia.com/v1alpha1
          kind: Skyhook
          metadata:
            name: config-skyhook
          status:
            status: complete
            observedGeneration: 4
            nodeState:
              (values(@)):
                - dexter|1.2.3:
                    name: dexter
                    state: complete
                    version: '1.2.3'
                    stage: post-interrupt
                    image: ghcr.io/nvidia/skyhook/agentless
                  baxter|3.2.1:
                    name: baxter
                    state: complete
                    version: '3.2.1'
                    stage: post-interrupt
                    image: ghcr.io/nvidia/skyhook/agentless
                  spencer|3.2.3:
                    name: spencer
                    state: complete
                    version: '3.2.3'
                    stage: post-interrupt
                    image: ghcr.io/nvidia/skyhook/agentless
            nodeStatus:
              (values(@)):
                - complete
    ## parallel: configmaps are distinct steady-state resources
    - assert:
        file: assert-cm-update.yaml
  - name: no-interrupt update
    description: Apply a config update with no interrupt and verify the node is not rebooted
    try:
    - apply:
        file: update-no-interrupt.yaml
    ## sequential: node/skyhook transition through lifecycle stages
    - assert:
        ## node complete - baxter/dexter at config stage (no interrupt), spencer at post-interrupt
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_config-skyhook: complete
            annotations:
              ("skyhook.nvidia.com/nodeState_config-skyhook" && parse_json("skyhook.nvidia.com/nodeState_config-skyhook")):
                {
                  "baxter|3.2.1": {
                      "name": "baxter",
                      "version": "3.2.1",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "config",
                      "state": "complete"
                  },
                  "dexter|1.2.3": {
                      "name": "dexter",
                      "version": "1.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "config",
                      "state": "complete"
                  },
                  "spencer|3.2.3": {
                      "name": "spencer",
                      "version": "3.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "post-interrupt",
                      "state": "complete"
                  }
                }
              skyhook.nvidia.com/status_config-skyhook: complete
          status:
            (conditions[?type == 'skyhook.nvidia.com/config-skyhook/NotReady']):
            - reason: "Complete"
              status: "False"
            (conditions[?type == 'skyhook.nvidia.com/config-skyhook/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        ## skyhook complete (gen 5)
        resource:
          apiVersion: skyhook.nvidia.com/v1alpha1
          kind: Skyhook
          metadata:
            name: config-skyhook
          status:
            status: complete
            observedGeneration: 5
            nodeState:
              (values(@)):
                - dexter|1.2.3:
                    name: dexter
                    state: complete
                    version: '1.2.3'
                    stage: config
                    image: ghcr.io/nvidia/skyhook/agentless
                  baxter|3.2.1:
                    name: baxter
                    state: complete
                    version: '3.2.1'
                    stage: config
                    image: ghcr.io/nvidia/skyhook/agentless
                  spencer|3.2.3:
                    name: spencer
                    state: complete
                    version: '3.2.3'
                    stage: post-interrupt
                    image: ghcr.io/nvidia/skyhook/agentless
            nodeStatus:
              (values(@)):
                - complete
    ## parallel: configmaps are distinct steady-state resources
    - assert:
        file: assert-cm-update-no-interrupt.yaml
  - name: glob update
    description: Apply a config update using glob-based package selection and assert it completes
    try:
    - apply:
        file: update-glob.yaml
    ## sequential: pod/node/skyhook transition through lifecycle stages
    - assert:
        ## dexter config pod exists
        resource:
          apiVersion: v1
          kind: Pod
          metadata:
            namespace: skyhook
            labels:
              skyhook.nvidia.com/name: config-skyhook
              skyhook.nvidia.com/package: dexter-1.2.3
            annotations:
              ("skyhook.nvidia.com/package" && parse_json("skyhook.nvidia.com/package")):
                {
                  "name": "dexter",
                  "version": "1.2.3",
                  "skyhook": "config-skyhook",
                  "stage": "config"
                }
          spec:
            initContainers:
              - name: dexter-init
              - name: dexter-config
                args:
                  ([0]): config
                  ([1]): /root
                  (length(@)): 3
              - name: dexter-configcheck
                args:
                  ([0]): config-check
                  ([1]): /root
                  (length(@)): 3
    - assert:
        ## node complete (only dexter in nodeState after glob update)
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_config-skyhook: complete
            annotations:
              ("skyhook.nvidia.com/nodeState_config-skyhook" && parse_json("skyhook.nvidia.com/nodeState_config-skyhook")):
                {
                  "dexter|1.2.3": {
                      "name": "dexter",
                      "version": "1.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "post-interrupt",
                      "state": "complete"
                  }
                }
              skyhook.nvidia.com/status_config-skyhook: complete
          status:
            (conditions[?type == 'skyhook.nvidia.com/config-skyhook/NotReady']):
            - reason: "Complete"
              status: "False"
            (conditions[?type == 'skyhook.nvidia.com/config-skyhook/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        ## skyhook complete (only dexter)
        resource:
          apiVersion: skyhook.nvidia.com/v1alpha1
          kind: Skyhook
          metadata:
            name: config-skyhook
          status:
            status: complete
            nodeState:
              (values(@)):
                - dexter|1.2.3:
                    name: dexter
                    state: complete
                    version: '1.2.3'
                    stage: post-interrupt
                    image: ghcr.io/nvidia/skyhook/agentless
            nodeStatus:
              (values(@)):
                - complete
    ## parallel: configmap is a steady-state resource
    - assert:
        file: assert-cm-update-glob.yaml
