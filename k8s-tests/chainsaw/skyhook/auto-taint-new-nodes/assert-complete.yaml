# Assert the node completed and the runtime-required taint was removed
apiVersion: v1
kind: Node
metadata:
  name: kind-worker
  labels:
    skyhook.nvidia.com/status_auto-taint-new-nodes: complete
  annotations:
    skyhook.nvidia.com/status_auto-taint-new-nodes: complete
spec:
  # Verify the runtime-required taint has been removed after completion
  (!taints || length(taints)==`0` || length(taints[?key == 'skyhook.nvidia.com' && effect == 'NoSchedule' && value == 'runtime-required'])==`0`): true
